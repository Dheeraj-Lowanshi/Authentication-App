spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root
    password: abcd

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - openid

          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - user:email
              - read:user

logging:
  level:
    org.springframework.security: DEBUG

# ✅ Your custom JWT config (keep separate from spring.security)
security:
  jwt:
    secret: ${JWT_SECRET:jajsndjhdansdoqieubakloaiwuqpooeirubvnnkzsnkasjiejmansnxzqwertyuioasdfghjklzxcvbnmtvuiwdhjcnsuhjdbscikjnsdcoikjsdOikjcsdiokjn}
    issuer: ${JWT_ISSUER:api.substring.com}

    access-ttl-seconds: ${JWT_ACCESS_TTL_SECOND:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECOND:86400}

    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}
    cookie-domain: ${JWT_COOKIE_DOMAIN:localhost}


app:
  auth:
    frontend:
      success-redirect: http://localhost:5173/auth/success
      failure-redirect: http://localhost:5173/auth/failure
  cors:
    front-end-url: ${FRONT_END_URL:http://localhost:5173}